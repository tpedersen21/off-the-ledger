name: Update incident data

on:
  schedule:
    - cron: '0 11 * * *'  # 11 AM UTC = 6 AM CDT / 5 AM CST
  workflow_dispatch:       # manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Restore the weekly CSV cache so we only download new files each run.
      # run_id in the key means it never hits exactly, so it always falls through
      # to restore-keys and picks up the most recent saved cache.
      - name: Restore CSV cache
        uses: actions/cache@v4
        with:
          path: cache/
          key: csv-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            csv-cache-${{ runner.os }}-

      - name: Fetch and rebuild data
        run: python3 fetch_data.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js rows.js cache/
          git diff --staged --quiet && echo "No changes." || \
            git commit -m "chore: update incident data $(date -u +%Y-%m-%d)"
          git pull --rebase && git push
